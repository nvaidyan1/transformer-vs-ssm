arch: mamba
seed: 42
seq_len: 1024
batch_size: 16
num_workers: 4
pin_memory: true
grad_accum_steps: 1
max_steps: 50000
warmup_steps: 2000
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
log_every: 500
save_every: 1000
checkpoint_dir: checkpoints/mamba

model:
  n_layers: 14      # → 9,635,328 params
  d_model: 256
  d_state: 16
  d_conv: 4
  expand: 2
  dropout: 0.1
