arch: tcn
seed: 42
seq_len: 1024
batch_size: 16
grad_accum_steps: 1
max_steps: 50000
warmup_steps: 2000
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
log_every: 100
save_every: 5000
checkpoint_dir: checkpoints/tcn

model:
  n_layers: 18      # → 9,596,416 params
  d_model: 256
  kernel_size: 7
  dropout: 0.1
